<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OP Leaderboard</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #ffffff;
            --panel: #ffffff;
            --panel-alt: #f6f8fb;
            --text: #161a22;
            --muted: #5c6675;
            --line: #d8dee8;
            --gold: #f5c542;
            --silver: #d9d9d9;
            --bronze: #c88f52;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        main {
            width: min(1000px, calc(100% - 32px));
            margin: 32px auto;
        }

        header {
            text-align: center;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--line);
        }

        h1 {
            margin: 0;
            font-size: 34px;
            line-height: 1.1;
        }

        .summary {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 15px;
        }

        table {
            width: 100%;
            margin-top: 22px;
            border-collapse: collapse;
            overflow: hidden;
            border: 1px solid var(--line);
        }

        thead {
            background: #edf1f6;
        }

        th,
        td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--line);
        }

        th {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        tbody tr:nth-child(even) {
            background: var(--panel);
        }

        tbody tr:nth-child(odd) {
            background: var(--panel-alt);
        }

        .rank {
            display: inline-flex;
            min-width: 54px;
            height: 34px;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: #3b3b3b;
            color: #ffffff;
            font-weight: 700;
        }

        .rank-1 {
            background: var(--gold);
            color: #111111;
        }

        .rank-2 {
            background: var(--silver);
            color: #111111;
        }

        .rank-3 {
            background: var(--bronze);
            color: #111111;
        }

        .player {
            font-size: 18px;
            font-weight: 700;
        }

        .points {
            font-size: 18px;
            font-weight: 700;
            white-space: nowrap;
        }

        @media print {
            main {
                width: 100%;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>OP Leaderboard</h1>
            <p class="summary">Total players: 8 | Generated 2026-05-13 18:13</p>
        </header>
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Points</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><span class="rank rank-1">#1</span></td>
                    <td class="player">Shed</td>
                    <td class="points">21 pts</td>
                </tr>
<tr>
                    <td><span class="rank rank-2">#2</span></td>
                    <td class="player">Maximus Decimus Meridius </td>
                    <td class="points">15 pts</td>
                </tr>
<tr>
                    <td><span class="rank rank-3">#3</span></td>
                    <td class="player">Astrit</td>
                    <td class="points">14 pts</td>
                </tr>
<tr>
                    <td><span class="rank rank-other">#4</span></td>
                    <td class="player">Lauraa22</td>
                    <td class="points">11 pts</td>
                </tr>
<tr>
                    <td><span class="rank rank-other">#5</span></td>
                    <td class="player">Jacko</td>
                    <td class="points">11 pts</td>
                </tr>
<tr>
                    <td><span class="rank rank-other">#6</span></td>
                    <td class="player">Dopamine</td>
                    <td class="points">8 pts</td>
                </tr>
<tr>
                    <td><span class="rank rank-other">#7</span></td>
                    <td class="player">Roy</td>
                    <td class="points">8 pts</td>
                </tr>
<tr>
                    <td><span class="rank rank-other">#8</span></td>
                    <td class="player">Cat</td>
                    <td class="points">8 pts</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
